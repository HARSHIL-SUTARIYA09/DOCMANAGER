<svg viewBox="0 0 900 620" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', sans-serif">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
    <linearGradient id="uiGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6"/>
      <stop offset="100%" style="stop-color:#2563eb"/>
    </linearGradient>
    <linearGradient id="coreGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8b5cf6"/>
      <stop offset="100%" style="stop-color:#7c3aed"/>
    </linearGradient>
    <linearGradient id="dbGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981"/>
      <stop offset="100%" style="stop-color:#059669"/>
    </linearGradient>
    <linearGradient id="storageGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e0b"/>
      <stop offset="100%" style="stop-color:#d97706"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000" flood-opacity="0.4"/>
    </filter>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748b"/>
    </marker>
    <marker id="arrowBlue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#3b82f6"/>
    </marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#10b981"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="900" height="620" fill="url(#bgGrad)" rx="16"/>

  <!-- Grid pattern -->
  <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
    <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#ffffff08" stroke-width="1"/>
  </pattern>
  <rect width="900" height="620" fill="url(#grid)" rx="16"/>

  <!-- Title -->
  <text x="450" y="42" text-anchor="middle" fill="#f1f5f9" font-size="22" font-weight="700" letter-spacing="1">DocManager — Architecture Diagram</text>
  <text x="450" y="62" text-anchor="middle" fill="#64748b" font-size="12">Smart PDF Document Management System</text>
  <line x1="200" y1="75" x2="700" y2="75" stroke="#334155" stroke-width="1"/>

  <!-- ===== USER LAYER ===== -->
  <rect x="340" y="90" width="220" height="54" rx="12" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="450" y="112" text-anchor="middle" fill="#93c5fd" font-size="11" font-weight="600">👤 USER</text>
  <text x="450" y="130" text-anchor="middle" fill="#cbd5e1" font-size="10">Browser / Web Interface</text>

  <!-- Arrow: User → Streamlit UI -->
  <line x1="450" y1="144" x2="450" y2="168" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arrowBlue)" stroke-dasharray="5,3"/>

  <!-- ===== STREAMLIT UI LAYER ===== -->
  <rect x="80" y="168" width="640" height="90" rx="12" fill="#1e293b" stroke="#3b82f6" stroke-width="2" filter="url(#shadow)"/>
  <rect x="80" y="168" width="640" height="30" rx="12" fill="url(#uiGrad)" opacity="0.9"/>
  <rect x="80" y="188" width="640" height="10" fill="url(#uiGrad)" opacity="0.9"/>
  <text x="400" y="188" text-anchor="middle" fill="#ffffff" font-size="12" font-weight="700">🖥️  Streamlit UI  —  app/main.py</text>

  <!-- Tab boxes -->
  <rect x="100" y="208" width="175" height="38" rx="8" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1"/>
  <text x="188" y="224" text-anchor="middle" fill="#93c5fd" font-size="10" font-weight="600">📤 Upload Tab</text>
  <text x="188" y="238" text-anchor="middle" fill="#64748b" font-size="9">File, Tags, Desc, Date</text>

  <rect x="303" y="208" width="194" height="38" rx="8" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1"/>
  <text x="400" y="224" text-anchor="middle" fill="#93c5fd" font-size="10" font-weight="600">🔍 Search &amp; View Tab</text>
  <text x="400" y="238" text-anchor="middle" fill="#64748b" font-size="9">Search by Tag / Date · Reader Mode</text>

  <rect x="525" y="208" width="175" height="38" rx="8" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1"/>
  <text x="613" y="224" text-anchor="middle" fill="#93c5fd" font-size="10" font-weight="600">📊 Analytics Tab</text>
  <text x="613" y="238" text-anchor="middle" fill="#64748b" font-size="9">Usage charts · Doc Progress</text>

  <!-- Arrow: UI → Core -->
  <line x1="450" y1="258" x2="450" y2="288" stroke="#8b5cf6" stroke-width="1.5" marker-end="url(#arrow)" stroke-dasharray="5,3"/>

  <!-- ===== CORE SERVICES LAYER ===== -->
  <rect x="60" y="288" width="780" height="120" rx="12" fill="#1e293b" stroke="#8b5cf6" stroke-width="2" filter="url(#shadow)"/>
  <rect x="60" y="288" width="780" height="30" rx="12" fill="url(#coreGrad)" opacity="0.85"/>
  <rect x="60" y="308" width="780" height="10" fill="url(#coreGrad)" opacity="0.85"/>
  <text x="450" y="308" text-anchor="middle" fill="#ffffff" font-size="12" font-weight="700">⚙️  Core Services Layer</text>

  <!-- Core module boxes -->
  <rect x="80" y="328" width="140" height="68" rx="8" fill="#2d1b69" stroke="#8b5cf6" stroke-width="1"/>
  <text x="150" y="348" text-anchor="middle" fill="#c4b5fd" font-size="10" font-weight="600">DocumentService</text>
  <text x="150" y="362" text-anchor="middle" fill="#64748b" font-size="8.5">services.py</text>
  <text x="150" y="375" text-anchor="middle" fill="#94a3b8" font-size="8">upload · search</text>
  <text x="150" y="387" text-anchor="middle" fill="#94a3b8" font-size="8">get_all_documents</text>

  <rect x="238" y="328" width="140" height="68" rx="8" fill="#2d1b69" stroke="#8b5cf6" stroke-width="1"/>
  <text x="308" y="348" text-anchor="middle" fill="#c4b5fd" font-size="10" font-weight="600">FileManager</text>
  <text x="308" y="362" text-anchor="middle" fill="#64748b" font-size="8.5">file_manager.py</text>
  <text x="308" y="375" text-anchor="middle" fill="#94a3b8" font-size="8">save_file()</text>
  <text x="308" y="387" text-anchor="middle" fill="#94a3b8" font-size="8">timestamp filename</text>

  <rect x="396" y="328" width="140" height="68" rx="8" fill="#2d1b69" stroke="#8b5cf6" stroke-width="1"/>
  <text x="466" y="348" text-anchor="middle" fill="#c4b5fd" font-size="10" font-weight="600">ThumbnailGenerator</text>
  <text x="466" y="362" text-anchor="middle" fill="#64748b" font-size="8.5">thumbnail.py</text>
  <text x="466" y="375" text-anchor="middle" fill="#94a3b8" font-size="8">generate_thumbnail()</text>
  <text x="466" y="387" text-anchor="middle" fill="#94a3b8" font-size="8">get_total_pages()</text>

  <rect x="554" y="328" width="130" height="68" rx="8" fill="#2d1b69" stroke="#8b5cf6" stroke-width="1"/>
  <text x="619" y="348" text-anchor="middle" fill="#c4b5fd" font-size="10" font-weight="600">PDFReader</text>
  <text x="619" y="362" text-anchor="middle" fill="#64748b" font-size="8.5">reader.py</text>
  <text x="619" y="375" text-anchor="middle" fill="#94a3b8" font-size="8">convert_pdf_to</text>
  <text x="619" y="387" text-anchor="middle" fill="#94a3b8" font-size="8">images() · PyMuPDF</text>

  <rect x="700" y="328" width="120" height="68" rx="8" fill="#2d1b69" stroke="#8b5cf6" stroke-width="1"/>
  <text x="760" y="348" text-anchor="middle" fill="#c4b5fd" font-size="10" font-weight="600">AnalyticsService</text>
  <text x="760" y="362" text-anchor="middle" fill="#64748b" font-size="8.5">analytics.py</text>
  <text x="760" y="375" text-anchor="middle" fill="#94a3b8" font-size="8">record_visit()</text>
  <text x="760" y="387" text-anchor="middle" fill="#94a3b8" font-size="8">page_progress()</text>

  <!-- Arrows: Core → DB and Storage -->
  <line x1="270" y1="408" x2="270" y2="448" stroke="#10b981" stroke-width="1.5" marker-end="url(#arrowGreen)" stroke-dasharray="5,3"/>
  <line x1="450" y1="408" x2="450" y2="448" stroke="#10b981" stroke-width="1.5" marker-end="url(#arrowGreen)" stroke-dasharray="5,3"/>
  <line x1="630" y1="408" x2="630" y2="448" stroke="#f59e0b" stroke-width="1.5" marker-end="url(#arrow)" stroke-dasharray="5,3"/>

  <!-- ===== DATABASE LAYER ===== -->
  <rect x="60" y="448" width="430" height="110" rx="12" fill="#1e293b" stroke="#10b981" stroke-width="2" filter="url(#shadow)"/>
  <rect x="60" y="448" width="430" height="30" rx="12" fill="url(#dbGrad)" opacity="0.85"/>
  <rect x="60" y="468" width="430" height="10" fill="url(#dbGrad)" opacity="0.85"/>
  <text x="275" y="468" text-anchor="middle" fill="#ffffff" font-size="12" font-weight="700">🗄️  Database Layer  —  SQLite</text>

  <rect x="80" y="485" width="120" height="62" rx="8" fill="#064e3b" stroke="#10b981" stroke-width="1"/>
  <text x="140" y="502" text-anchor="middle" fill="#6ee7b7" font-size="10" font-weight="600">documents</text>
  <text x="140" y="516" text-anchor="middle" fill="#94a3b8" font-size="8">id, name, path</text>
  <text x="140" y="527" text-anchor="middle" fill="#94a3b8" font-size="8">tags, description</text>
  <text x="140" y="538" text-anchor="middle" fill="#94a3b8" font-size="8">dates, total_pages</text>

  <rect x="220" y="485" width="120" height="62" rx="8" fill="#064e3b" stroke="#10b981" stroke-width="1"/>
  <text x="280" y="502" text-anchor="middle" fill="#6ee7b7" font-size="10" font-weight="600">page_visits</text>
  <text x="280" y="516" text-anchor="middle" fill="#94a3b8" font-size="8">id, document_id</text>
  <text x="280" y="527" text-anchor="middle" fill="#94a3b8" font-size="8">page_number</text>
  <text x="280" y="538" text-anchor="middle" fill="#94a3b8" font-size="8">timestamp</text>

  <rect x="360" y="485" width="120" height="62" rx="8" fill="#064e3b" stroke="#10b981" stroke-width="1"/>
  <text x="420" y="502" text-anchor="middle" fill="#6ee7b7" font-size="10" font-weight="600">app_visits</text>
  <text x="420" y="516" text-anchor="middle" fill="#94a3b8" font-size="8">id, event_type</text>
  <text x="420" y="527" text-anchor="middle" fill="#94a3b8" font-size="8">timestamp</text>
  <text x="420" y="538" text-anchor="middle" fill="#94a3b8" font-size="8">upload · search · open</text>

  <!-- ===== STORAGE LAYER ===== -->
  <rect x="510" y="448" width="330" height="110" rx="12" fill="#1e293b" stroke="#f59e0b" stroke-width="2" filter="url(#shadow)"/>
  <rect x="510" y="448" width="330" height="30" rx="12" fill="url(#storageGrad)" opacity="0.85"/>
  <rect x="510" y="468" width="330" height="10" fill="url(#storageGrad)" opacity="0.85"/>
  <text x="675" y="468" text-anchor="middle" fill="#ffffff" font-size="12" font-weight="700">📁  File Storage</text>

  <rect x="530" y="485" width="135" height="62" rx="8" fill="#451a03" stroke="#f59e0b" stroke-width="1"/>
  <text x="598" y="502" text-anchor="middle" fill="#fcd34d" font-size="10" font-weight="600">storage/pdfs/</text>
  <text x="598" y="516" text-anchor="middle" fill="#94a3b8" font-size="8">Original PDF files</text>
  <text x="598" y="527" text-anchor="middle" fill="#94a3b8" font-size="8">+ page image folders</text>
  <text x="598" y="538" text-anchor="middle" fill="#94a3b8" font-size="8">page_0.png, page_1.png…</text>

  <rect x="685" y="485" width="135" height="62" rx="8" fill="#451a03" stroke="#f59e0b" stroke-width="1"/>
  <text x="753" y="502" text-anchor="middle" fill="#fcd34d" font-size="10" font-weight="600">storage/thumbnails/</text>
  <text x="753" y="516" text-anchor="middle" fill="#94a3b8" font-size="8">Cover previews</text>
  <text x="753" y="527" text-anchor="middle" fill="#94a3b8" font-size="8">First page as .png</text>
  <text x="753" y="538" text-anchor="middle" fill="#94a3b8" font-size="8">shown in search results</text>

  <!-- Legend -->
  <rect x="80" y="578" width="12" height="12" rx="3" fill="#3b82f6"/>
  <text x="98" y="589" fill="#94a3b8" font-size="10">UI Layer</text>
  <rect x="175" y="578" width="12" height="12" rx="3" fill="#8b5cf6"/>
  <text x="193" y="589" fill="#94a3b8" font-size="10">Core Services</text>
  <rect x="290" y="578" width="12" height="12" rx="3" fill="#10b981"/>
  <text x="308" y="589" fill="#94a3b8" font-size="10">Database</text>
  <rect x="385" y="578" width="12" height="12" rx="3" fill="#f59e0b"/>
  <text x="403" y="589" fill="#94a3b8" font-size="10">File Storage</text>
  <text x="820" y="589" text-anchor="end" fill="#334155" font-size="10">DocManager v1.0 · Harshil</text>
</svg>
